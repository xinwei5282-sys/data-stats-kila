<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>kila 达人投放数据汇总</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --bd: #d9d9d9;
    --bg: #fafafa;
    --primary: #1677ff;
    --ok: #52c41a;
    --warn: #faad14;
    --err: #ff4d4f;
    --muted: #8c8c8c;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    margin: 0;
    padding: 24px;
    background: #f0f2f5;
    color: #262626;
    font-size: 14px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); margin-bottom: 20px; }
  .panel {
    background: #fff;
    border: 1px solid var(--bd);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .panel-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .toolbar { display: flex; gap: 8px; }
  button {
    padding: 6px 14px;
    border: 1px solid var(--bd);
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  button:hover { border-color: var(--primary); color: var(--primary); }
  button.primary {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  button.primary:hover { opacity: 0.85; color: #fff; }
  button:disabled {
    background: #f5f5f5;
    color: #bfbfbf;
    cursor: not-allowed;
    border-color: var(--bd);
  }

  /* 上传区 */
  #drop-zone {
    border: 2px dashed var(--bd);
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    background: var(--bg);
    transition: all 0.2s;
    cursor: pointer;
  }
  #drop-zone.dragover {
    border-color: var(--primary);
    background: #e6f4ff;
  }
  #drop-zone .hint { color: var(--muted); margin-top: 8px; font-size: 13px; }
  #drop-zone .icon { font-size: 32px; color: var(--muted); }
  #file-input { display: none; }

  /* 文件列表 */
  .file-list { margin-top: 16px; }
  .file-item {
    display: grid;
    grid-template-columns: 1fr 160px 90px 80px 24px;
    gap: 12px;
    padding: 8px 12px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
    margin-bottom: 6px;
    align-items: center;
    font-size: 13px;
  }
  .file-item .remove {
    cursor: pointer;
    color: var(--muted);
    text-align: center;
    user-select: none;
  }
  .file-item .remove:hover { color: var(--err); }

  /* 状态聚合 */
  .summary-bar {
    margin-top: 12px;
    padding: 10px 14px;
    background: #f6ffed;
    border: 1px solid #b7eb8f;
    border-radius: 4px;
    font-size: 13px;
    color: #389e0d;
    display: none;
  }
  .summary-bar.warn {
    background: #fffbe6;
    border-color: #ffe58f;
    color: #d48806;
  }
  .summary-bar.show { display: block; }
  .summary-bar code {
    background: rgba(0,0,0,0.05);
    padding: 1px 4px;
    border-radius: 2px;
    font-size: 12px;
  }

  /* 全局 loading */
  #loading {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
    font-size: 16px;
    color: var(--primary);
  }
  #loading.show { display: flex; }
  .file-item .name { font-family: ui-monospace, monospace; color: #595959; }
  .file-item .type { color: var(--primary); }
  .file-item .rows { color: var(--muted); text-align: right; }
  .file-item .status { text-align: center; }
  .status-ok { color: var(--ok); }
  .status-warn { color: var(--warn); }
  .status-err { color: var(--err); }
  .status-muted { color: var(--muted); }

  /* 表格 */
  .table-wrap {
    overflow-x: auto;
    max-height: 600px;
    border: 1px solid #f0f0f0;
    border-radius: 4px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  th, td {
    padding: 8px 12px;
    border-bottom: 1px solid #f0f0f0;
    text-align: left;
    white-space: nowrap;
  }
  th {
    background: #fafafa;
    position: sticky;
    top: 0;
    font-weight: 600;
    color: #262626;
    z-index: 1;
  }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  tbody tr:hover { background: #fafafa; }
  tbody tr.total {
    font-weight: 600;
    background: #fafafa;
    border-top: 2px solid #d9d9d9;
  }
  tbody tr.total:hover { background: #f0f0f0; }
  tbody tr.talent-header {
    background: #f0f7ff;
    font-weight: 600;
    border-top: 1px solid #d9d9d9;
  }
  tbody tr.talent-header:hover { background: #e6f4ff; }
  tbody tr.talent-item td:first-child {
    padding-left: 28px;
    color: var(--muted);
  }
  td.editable {
    cursor: pointer;
    background: #fffbe6;
    position: relative;
  }
  td.editable:hover { background: #fff1b8; }
  td.editable::after {
    content: '✎';
    position: absolute;
    right: 4px;
    top: 4px;
    font-size: 10px;
    color: #d48806;
    opacity: 0.5;
  }
  td.editable input {
    width: 100%;
    border: 1px solid var(--primary);
    border-radius: 2px;
    padding: 4px;
    font-size: 13px;
    background: #fff;
    font-family: inherit;
    box-sizing: border-box;
  }
  td.editable input.num-input {
    text-align: right;
    font-variant-numeric: tabular-nums;
  }
  td.video-links a {
    color: var(--primary);
    text-decoration: none;
    display: block;
    line-height: 1.6;
    font-size: 12px;
  }
  td.video-links a:hover { text-decoration: underline; }
  td.video-links .sales { color: var(--muted); margin-left: 4px; }
  td.empty { color: var(--muted); }
  .placeholder {
    padding: 32px;
    text-align: center;
    color: var(--muted);
  }
</style>
</head>
<body>

<h1>kila 达人投放数据汇总</h1>
<div class="subtitle">拖拽 Excel 进入下方区域 → 自动输出达人维度和商品维度统计表</div>

<!-- 上传区 -->
<div class="panel">
  <div class="panel-title">
    <span>① 上传 Excel 文件</span>
    <div class="toolbar">
      <button id="btn-clear-files">清空</button>
    </div>
  </div>
  <div id="drop-zone">
    <div class="icon">📂</div>
    <div>把 Excel 文件拖到这里，或<a href="#" id="trigger-input" style="color: var(--primary);">点击选择</a></div>
    <div class="hint">支持：合作视频明细表 / 精选联盟订单明细表 / 达人发布明细表 / 乘方推广-产品 / 乘方推广-达人</div>
    <input type="file" id="file-input" multiple accept=".xlsx,.xls">
  </div>
  <div class="file-list" id="file-list"></div>
  <div class="summary-bar" id="summary-bar"></div>
</div>

<div id="loading">⏳ 正在解析 Excel...</div>

<!-- 达人维度 -->
<div class="panel">
  <div class="panel-title">
    <span>② 达人维度统计</span>
    <div class="toolbar">
      <button id="btn-export" class="primary" disabled>导出 Excel</button>
    </div>
  </div>
  <div class="table-wrap">
    <div id="table-talent" class="placeholder">上传文件后自动生成</div>
  </div>
</div>

<!-- 反查诊断 -->
<div class="panel" id="diag-panel" style="display:none">
  <div class="panel-title">
    <span>⚠️ 商品 ID 反查诊断 <span id="diag-summary" style="font-weight:normal;color:var(--muted);font-size:13px"></span></span>
    <div class="toolbar">
      <button id="btn-toggle-diag">展开</button>
      <button id="btn-clear-mapping">清空映射</button>
    </div>
  </div>
  <div id="diag-body" style="display:none"></div>
</div>

<!-- 商品维度 -->
<div class="panel">
  <div class="panel-title">
    <span>③ 商品维度统计</span>
    <div class="toolbar">
      <button id="btn-clear-meta">清空手编数据</button>
    </div>
  </div>
  <div class="table-wrap">
    <div id="table-product" class="placeholder">上传文件后自动生成</div>
  </div>
</div>

<script>
  // ============ 文件类型识别 ============
  // 类型 → 中文标签、所需 sheet 名（null 表示用第一个 sheet）
  const TYPES = {
    cooperation_video: { label: '合作视频明细',  sheet: null,     mergeable: false },
    union_orders:      { label: '精选联盟订单',  sheet: 'Sheet1', mergeable: false },
    talent_publish:    { label: '达人发布明细',  sheet: null,     mergeable: false },
    ad_product:        { label: '乘方推广-产品', sheet: null,     mergeable: true  },
    ad_talent:         { label: '乘方推广-达人', sheet: null,     mergeable: true  },
  };

  function recognizeType(fileName) {
    const n = fileName;
    if (n.includes('合作视频')) return 'cooperation_video';
    if (n.includes('精选联盟')) return 'union_orders';
    if (n.includes('达人发布')) return 'talent_publish';
    if (n.includes('乘方推广') && n.includes('产品')) return 'ad_product';
    if (n.includes('乘方推广') && n.includes('达人')) return 'ad_talent';
    return null;
  }

  // ============ 状态 ============
  const state = {
    files: [],   // [{name, type, rows, statusClass, statusText, data}]
    data: {      // 按类型分组的合并数据（多份乘方推广 append）
      cooperation_video: [],
      union_orders: [],
      talent_publish: [],
      ad_product: [],
      ad_talent: [],
    },
    talent: [],
    product: [],
    // —— 当前分析月份（推断自达人发布明细的最大日期；4月数据上传 → 4月，5月 → 5月）——
    currentYear: 2026,
    currentMonth: 4,            // 1-12
    monthLabel: '4月',          // 用于过滤 talent_publish['月份']
    diagnostics: { unmapped: [], ambiguous: [], productList: [] },
  };

  // ============ DOM ============
  const dropZone     = document.getElementById('drop-zone');
  const fileInput    = document.getElementById('file-input');
  const fileListEl   = document.getElementById('file-list');
  const summaryBar   = document.getElementById('summary-bar');
  const loadingEl    = document.getElementById('loading');
  const btnClearFiles= document.getElementById('btn-clear-files');
  const btnExport    = document.getElementById('btn-export');
  const btnClearMeta = document.getElementById('btn-clear-meta');

  // ============ 上传区交互 ============
  document.getElementById('trigger-input').addEventListener('click', (e) => {
    e.preventDefault();
    e.stopPropagation();
    fileInput.click();
  });
  dropZone.addEventListener('click', () => fileInput.click());
  ['dragenter', 'dragover'].forEach(ev => {
    dropZone.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.add('dragover');
    });
  });
  ['dragleave', 'drop'].forEach(ev => {
    dropZone.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      dropZone.classList.remove('dragover');
    });
  });
  dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
  fileInput.addEventListener('change', (e) => {
    handleFiles(e.target.files);
    fileInput.value = ''; // 允许重选同名文件
  });

  btnClearFiles.addEventListener('click', () => {
    if (!state.files.length) return;
    if (!confirm('清空全部已上传文件？')) return;
    state.files = [];
    rebuildDataIndex();
    renderFileList();
  });

  btnExport.addEventListener('click', () => {
    if (!state.talent.length && !state.product.length) {
      alert('请先上传 Excel 文件');
      return;
    }
    exportToExcel();
  });

  btnClearMeta.addEventListener('click', () => {
    const meta = loadProductMeta();
    const n = Object.keys(meta).length;
    if (n === 0) {
      alert('当前没有手编数据');
      return;
    }
    if (!confirm(`确定清空 ${n} 个商品的手编数据（分类 / 客单价）？\n此操作不可撤销。`)) return;
    localStorage.removeItem(PRODUCT_META_KEY);
    recompute(); // 重新计算并渲染
    console.log('✓ 已清空手编数据');
  });

  // 诊断面板：折叠 / 清空映射
  document.getElementById('btn-toggle-diag').addEventListener('click', () => {
    const body = document.getElementById('diag-body');
    const btn = document.getElementById('btn-toggle-diag');
    const collapsed = body.style.display === 'none';
    body.style.display = collapsed ? '' : 'none';
    btn.textContent = collapsed ? '收起' : '展开';
  });
  document.getElementById('btn-clear-mapping').addEventListener('click', () => {
    const m = loadNameMapping();
    const n = Object.keys(m).length;
    if (n === 0) { alert('当前没有短名→商品ID 映射'); return; }
    if (!confirm(`确定清空 ${n} 条短名→商品ID 映射？\n清空后所有手动指定的反查关系会失效。`)) return;
    localStorage.removeItem(NAME_MAPPING_KEY);
    recompute();
    console.log('✓ 已清空短名映射');
  });

  // ============ 核心：解析文件 ============
  async function handleFiles(fileList) {
    const files = Array.from(fileList || []);
    if (!files.length) return;

    loadingEl.classList.add('show');
    try {
      // 串行解析，避免大文件时浏览器卡死
      for (const file of files) {
        await parseOneFile(file);
        renderFileList(); // 每解析完一个就更新
      }
      rebuildDataIndex();
      renderFileList();
    } finally {
      loadingEl.classList.remove('show');
    }
  }

  async function parseOneFile(file) {
    const type = recognizeType(file.name);
    const entry = {
      name: file.name,
      type,
      rows: 0,
      statusClass: 'ok',
      statusText: '✓',
      data: null,
    };

    if (!type) {
      entry.statusClass = 'err';
      entry.statusText = '未识别';
      upsertFile(entry);
      console.warn('文件未识别:', file.name);
      return;
    }

    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type: 'array', cellDates: true });

      // 选 sheet
      const cfg = TYPES[type];
      let sheetName = cfg.sheet;
      if (!sheetName || !wb.SheetNames.includes(sheetName)) {
        sheetName = wb.SheetNames[0];
      }
      const ws = wb.Sheets[sheetName];
      const raw = XLSX.utils.sheet_to_json(ws, { defval: null, raw: false });

      // 清洗：trim 字符串字段（抖店导出常带 trailing \t）
      const cleaned = raw.map(cleanRow);
      entry.data = cleaned;
      entry.rows = cleaned.length;

      if (cleaned.length === 0) {
        entry.statusClass = 'warn';
        entry.statusText = '空表';
      }
    } catch (e) {
      entry.statusClass = 'err';
      entry.statusText = '解析失败';
      console.error('解析失败:', file.name, e);
    }

    upsertFile(entry);
  }

  function cleanRow(row) {
    const out = {};
    for (const k of Object.keys(row)) {
      let v = row[k];
      if (typeof v === 'string') v = v.trim();
      out[k.trim()] = v;
    }
    return out;
  }

  function upsertFile(entry) {
    const i = state.files.findIndex(f => f.name === entry.name);
    if (i >= 0) state.files[i] = entry;
    else state.files.push(entry);
  }

  // 按类型聚合 data，多份 mergeable 的会拼接
  function rebuildDataIndex() {
    for (const t of Object.keys(state.data)) state.data[t] = [];
    for (const f of state.files) {
      if (!f.type || !f.data) continue;
      state.data[f.type] = state.data[f.type].concat(f.data);
    }
    console.log('数据索引:', Object.fromEntries(
      Object.entries(state.data).map(([k, v]) => [TYPES[k].label, v.length])
    ));
    // 月份推断必须在 summary 渲染之前（summary 会显示当前月份）
    inferCurrentMonth();
    renderSummary();
    recompute();
  }

  // ============ 文件列表 UI ============
  function renderFileList() {
    if (!state.files.length) {
      fileListEl.innerHTML = '';
      return;
    }
    fileListEl.innerHTML = state.files.map((f, i) => `
      <div class="file-item">
        <div class="name" title="${escapeHtml(f.name)}">${escapeHtml(f.name)}</div>
        <div class="type">${f.type ? TYPES[f.type].label : '—'}</div>
        <div class="rows">${f.rows.toLocaleString()} 行</div>
        <div class="status status-${f.statusClass}">${f.statusText}</div>
        <div class="remove" data-i="${i}" title="移除">✕</div>
      </div>
    `).join('');
    // 绑定移除按钮
    fileListEl.querySelectorAll('.remove').forEach(el => {
      el.addEventListener('click', () => {
        const idx = +el.dataset.i;
        state.files.splice(idx, 1);
        rebuildDataIndex();
        renderFileList();
      });
    });
  }

  function renderSummary() {
    const required = ['cooperation_video', 'union_orders', 'talent_publish', 'ad_product', 'ad_talent'];
    const missing = required.filter(t => state.data[t].length === 0);
    const present = required.filter(t => state.data[t].length > 0);

    if (state.files.length === 0) {
      summaryBar.classList.remove('show');
      return;
    }

    summaryBar.classList.add('show');
    const monthHint = state.monthLabel
      ? `<br>当前分析月份: <b>${state.monthLabel}</b>（自动识别自达人发布明细的最大日期）`
      : '';
    if (missing.length === 0) {
      summaryBar.classList.remove('warn');
      summaryBar.innerHTML = `✓ 5 类数据齐全，可进入下一步统计${monthHint}`;
    } else {
      summaryBar.classList.add('warn');
      summaryBar.innerHTML =
        `已识别: ${present.map(t => `<code>${TYPES[t].label}</code>`).join(' ')}<br>` +
        `还缺: ${missing.map(t => `<code>${TYPES[t].label}</code>`).join(' ')}${monthHint}`;
    }
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    })[c]);
  }

  // ============ localStorage：手编值持久化 ============
  const PRODUCT_META_KEY = 'kila-stats:product-meta';

  function loadProductMeta() {
    try {
      const raw = localStorage.getItem(PRODUCT_META_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.warn('读取手编值失败', e);
      return {};
    }
  }

  function saveProductMeta(meta) {
    try {
      localStorage.setItem(PRODUCT_META_KEY, JSON.stringify(meta));
    } catch (e) {
      console.error('保存手编值失败', e);
    }
  }

  // 写入单个商品的手编值
  function updateProductMeta(pid, field, value) {
    const meta = loadProductMeta();
    if (!meta[pid]) meta[pid] = {};
    if (value == null || value === '') {
      delete meta[pid][field];
      if (Object.keys(meta[pid]).length === 0) delete meta[pid];
    } else {
      meta[pid][field] = value;
    }
    saveProductMeta(meta);
  }

  // —— 达人手编值（按 达人昵称 持久化）——
  const TALENT_META_KEY = 'kila-stats:talent-meta';

  function loadTalentMeta() {
    try {
      const raw = localStorage.getItem(TALENT_META_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.warn('读取达人手编值失败', e);
      return {};
    }
  }

  function saveTalentMeta(meta) {
    try {
      localStorage.setItem(TALENT_META_KEY, JSON.stringify(meta));
    } catch (e) {
      console.error('保存达人手编值失败', e);
    }
  }

  function updateTalentMeta(name, field, value) {
    const meta = loadTalentMeta();
    if (!meta[name]) meta[name] = {};
    if (value == null || value === '') {
      delete meta[name][field];
      if (Object.keys(meta[name]).length === 0) delete meta[name];
    } else {
      meta[name][field] = value;
    }
    saveTalentMeta(meta);
  }

  // —— 短名 → 商品ID 手动映射（用于反查失败或歧义短名）——
  const NAME_MAPPING_KEY = 'kila-stats:name-mapping';

  function loadNameMapping() {
    try {
      const raw = localStorage.getItem(NAME_MAPPING_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch (e) {
      console.warn('读取短名映射失败', e);
      return {};
    }
  }

  function saveNameMapping(mapping) {
    try {
      localStorage.setItem(NAME_MAPPING_KEY, JSON.stringify(mapping));
    } catch (e) {
      console.error('保存短名映射失败', e);
    }
  }

  function updateNameMapping(shortName, pid) {
    const mapping = loadNameMapping();
    if (pid == null || pid === '') delete mapping[shortName];
    else mapping[shortName] = pid;
    saveNameMapping(mapping);
  }

  // ============ 工具函数 ============
  // 抖店导出的数字字段经常带千分位逗号 / 百分号 → 必须清洗
  function num(v) {
    if (v == null) return 0;
    if (typeof v === 'number') return v;
    const s = String(v).replace(/,/g, '').replace(/%/g, '').trim();
    const n = parseFloat(s);
    return isNaN(n) ? 0 : n;
  }

  // 乘方推广 表里"投放消耗"字段：5 月有的账号叫"整体消耗"，有的叫"综合成本"，值一致
  function adCostOf(r) {
    return num(r['整体消耗'] != null ? r['整体消耗'] : r['综合成本']);
  }

  // 合作视频明细表里"投放消耗"字段：自动检测列名（不同月份导出的列名可能不一样）
  // 第一次调用时扫描所有键，记下哪个键名包含"消耗"，后续直接复用
  let _videoCostKey = null;
  function videoAdCostOf(r) {
    if (_videoCostKey === null) {
      const preferred = ['投放消耗(元)', '投放消耗', '抖加消耗', '千川消耗', '整体消耗', '综合消耗'];
      for (const k of preferred) {
        if (k in r) { _videoCostKey = k; break; }
      }
      if (_videoCostKey === null) {
        for (const k of Object.keys(r)) {
          if (k.includes('消耗') || k.includes('花费')) { _videoCostKey = k; break; }
        }
      }
      console.log('[debug] 合作视频明细 投放消耗列识别为:', _videoCostKey);
    }
    if (_videoCostKey && r[_videoCostKey] != null && r[_videoCostKey] !== '') return num(r[_videoCostKey]);
    return 0;
  }

  // 把 Excel 读出来的日期值统一格式化成 YYYY-MM-DD
  function formatPubTime(v) {
    if (v == null || v === '') return '';
    if (v instanceof Date && !isNaN(v.getTime())) {
      const y = v.getFullYear(), m = String(v.getMonth() + 1).padStart(2, '0'), d = String(v.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }
    const s = String(v).trim();
    const m = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
    if (m) return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
    return s;
  }

  // 解析任意日期值（Date 对象 / 字符串）为 { year, month }，失败返回 null
  function parseYearMonth(v) {
    if (v == null || v === '') return null;
    if (v instanceof Date && !isNaN(v.getTime())) {
      return { year: v.getFullYear(), month: v.getMonth() + 1 };
    }
    const s = String(v).trim();
    // 支持 2026-04-XX / 2026/04/XX / 2026/4/XX / 2026-4-XX
    const m = s.match(/^(\d{4})[-/](\d{1,2})/);
    if (m) return { year: parseInt(m[1], 10), month: parseInt(m[2], 10) };
    return null;
  }

  // 判断日期是否在 state.currentYear/currentMonth 这一月
  function isInCurrentMonth(dateVal) {
    const ym = parseYearMonth(dateVal);
    if (!ym) return false;
    return ym.year === state.currentYear && ym.month === state.currentMonth;
  }

  // 从达人发布明细的"发布日期"列推断当前分析月份；空表 fallback 合作视频表；都空 fallback {2026, 4}
  function inferCurrentMonth() {
    const { talent_publish, cooperation_video } = state.data;
    let best = null;
    // 优先源：达人发布明细（人工录入，月份语义最准）
    for (const r of talent_publish) {
      const ym = parseYearMonth(r['发布日期']);
      if (!ym) continue;
      const key = ym.year * 100 + ym.month;
      if (!best || key > best.year * 100 + best.month) best = ym;
    }
    // fallback：合作视频明细（注意会包含 2024/2025 历史数据，所以仅在发布表完全为空时用）
    if (!best) {
      for (const r of cooperation_video) {
        const ym = parseYearMonth(r['发布时间']);
        if (!ym) continue;
        const key = ym.year * 100 + ym.month;
        if (!best || key > best.year * 100 + best.month) best = ym;
      }
    }
    if (!best) best = { year: 2026, month: 4 };
    state.currentYear = best.year;
    state.currentMonth = best.month;
    state.monthLabel = `${best.month}月`;
    return best;
  }

  function fmtMoney(n) {
    if (n === '-' || n == null) return '-';
    return Number(n).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }
  function fmtInt(n) {
    if (n === '-' || n == null) return '-';
    return Number(n).toLocaleString('zh-CN');
  }

  // ============ 计算：达人维度（按 达人 × 商品 展开）============
  function computeTalent() {
    const { cooperation_video, union_orders, talent_publish, ad_talent, ad_product } = state.data;

    // 一次性调试：打印合作视频明细第一条的所有列名，确认"投放消耗"列名
    if (cooperation_video.length > 0) {
      console.log('[debug] keys =', Object.keys(cooperation_video[0]).join(' | '));
      console.log('[debug] sample =', JSON.stringify(cooperation_video[0]));
    }

    // 全局商品名字典（跨乘方推广 + 精选联盟）
    const productName = new Map();
    for (const r of ad_product) {
      const pid = String(r['商品ID'] || '').trim();
      if (pid && r['商品名称'] && !productName.has(pid)) productName.set(pid, r['商品名称']);
    }
    for (const r of union_orders) {
      const pid = String(r['商品id'] || '').trim();
      if (pid && r['商品名称'] && !productName.has(pid)) productName.set(pid, r['商品名称']);
    }
    // 用于按商品反查发布条数（与商品维度共用逻辑）
    const nameToId = new Map();
    const validPids = new Set();
    for (const r of ad_product) {
      const pid = String(r['商品ID'] || '').trim();
      const nm = (r['商品名称'] || '').trim();
      if (pid) validPids.add(pid);
      if (pid && nm && !nameToId.has(nm)) nameToId.set(nm, pid);
    }
    const nameMapping = loadNameMapping();
    // 优先级：商品ID列 > 手动映射 > 短名精确 > 短名模糊
    function lookupPid(pub) {
      const direct = String(pub['商品ID'] || '').trim();
      if (direct) return direct;
      const sn = (pub['产品名称'] || '').trim();
      if (!sn) return null;
      if (nameMapping[sn] && validPids.has(nameMapping[sn])) return nameMapping[sn];
      if (nameToId.has(sn)) return nameToId.get(sn);
      for (const [longName, pid] of nameToId) {
        if (longName.includes(sn)) return pid;
      }
      return null;
    }

    // 合作达人 = 乘方推广-达人(4账号合并) 里出现的达人（去重，只看真正投流的）
    const talents = new Set();
    ad_talent.forEach(r => r['抖音号名称'] && talents.add(r['抖音号名称']));

    // 预聚合：当月已投流（是否投放='是'）视频条数 — 用于子行投放消耗按比例分摊
    // 口径：合作视频明细表 5月起没有"投放消耗(元)"列，子行投放消耗按"该商品已投流视频数 / 该达人当月已投流视频总数"分摊主行总消耗
    const talentInvestedVideos = new Map();             // 达人 → 当月已投流视频总数
    const talentProductInvestedVideos = new Map();      // 达人|pid → 当月已投流视频数
    for (const r of cooperation_video) {
      if (String(r['是否投放']).trim() !== '是') continue;
      if (!isInCurrentMonth(r['发布时间'])) continue;
      const name = r['达人昵称'];
      const pid = String(r['带货商品ID'] || '').trim();
      if (!name || !pid) continue;
      talentInvestedVideos.set(name, (talentInvestedVideos.get(name) || 0) + 1);
      const key = `${name}\x00${pid}`;
      talentProductInvestedVideos.set(key, (talentProductInvestedVideos.get(key) || 0) + 1);
    }

    // 对接人字典：达人昵称 → 对接人（从 达人发布明细表 抽取，取首个非空值）
    const contactMap = new Map();
    for (const r of talent_publish) {
      const name = (r['达人昵称'] || '').trim();
      const contact = (r['对接人'] || '').trim();
      if (name && contact && !contactMap.has(name)) contactMap.set(name, contact);
    }

    const rows = [];

    for (const name of talents) {
      // ===== 达人级别（4 个汇总值）=====
      // 当月发布条数 = 合作视频明细表 当月发布的该达人视频数（抖店实际导出，比达人发布明细表准）
      const publishCount = cooperation_video.filter(
        r => r['达人昵称'] === name && isInCurrentMonth(r['发布时间'])
      ).length;

      const gsvTotal = union_orders
        .filter(r => r['作者账号'] === name)
        .reduce((s, r) => s + num(r['支付金额']) - num(r['订单退货退款']), 0);

      // 当月发布素材投放消耗 = 合作视频明细表 该达人 + 发布时间 ∈ 当前月 sum(投放消耗)
      // 口径：只统计「本月发布素材」的投流消耗，与列名一致
      const adCostThisMonth = cooperation_video
        .filter(r => r['达人昵称'] === name && isInCurrentMonth(r['发布时间']))
        .reduce((s, r) => s + videoAdCostOf(r), 0);

      // 投放消耗（含非当月）= 乘方推广-达人 4 账号合并 日期='全部' sum(整体消耗 ?? 综合成本)
      const adCostTotal = ad_talent
        .filter(r => r['抖音号名称'] === name && r['日期'] === '全部')
        .reduce((s, r) => s + adCostOf(r), 0);

      // 跳过完全无数据的达人
      if (publishCount === 0 && gsvTotal === 0 && adCostThisMonth === 0 && adCostTotal === 0) continue;

      // ===== 商品级别 =====
      // 该达人在合作视频里带货过的商品ID（去重，从带货商品ID列）
      const pidsFromVideo = new Set();
      cooperation_video
        .filter(r => r['达人昵称'] === name)
        .forEach(r => {
          const pid = String(r['带货商品ID'] || '').trim();
          if (pid) pidsFromVideo.add(pid);
        });
      // 也加入该达人在达人发布明细里发布过的商品ID（反查）
      talent_publish
        .filter(r => r['达人昵称'] === name && r['月份'] === state.monthLabel)
        .forEach(r => {
          const pid = lookupPid(r);
          if (pid) pidsFromVideo.add(pid);
        });

      // 计算每个商品的子行
      const totalInvested = talentInvestedVideos.get(name) || 0;
      const items = [];
      for (const pid of pidsFromVideo) {
        const gsv = union_orders
          .filter(r => r['作者账号'] === name && String(r['商品id']) === pid)
          .reduce((s, r) => s + num(r['支付金额']) - num(r['订单退货退款']), 0);
        // 按商品的发布条数 = 合作视频明细表 当月发布 + 带货商品ID 匹配
        const videosOfProductApr = cooperation_video
          .filter(r => r['达人昵称'] === name && isInCurrentMonth(r['发布时间']) && String(r['带货商品ID']) === pid);
        const pubCount = videosOfProductApr.length;
        // 子行只在 gsv > 0 或 pubCount > 0 时才显示
        if (gsv === 0 && pubCount === 0) continue;

        // 子行当月发布素材投放消耗 = 合作视频明细 该达人 + 该商品 + 发布时间 ∈ 当前月 sum(投放消耗)
        //   — 与主行口径一致：只统计本月发布素材的投流消耗
        // 子行投放消耗（含非当月）= 主行 adCostTotal × (该商品已投流视频数 / 该达人已投流视频总数)
        //   — ad_talent 没有商品ID，只能按已投流视频数比例分摊；未投流该商品 → 显示 '-'
        const videosOfProductAll = cooperation_video
          .filter(r => r['达人昵称'] === name && String(r['带货商品ID']) === pid);
        const allocatedThisMonth = videosOfProductAll
          .filter(r => isInCurrentMonth(r['发布时间']))
          .reduce((s, r) => s + videoAdCostOf(r), 0);
        const investedHere = talentProductInvestedVideos.get(`${name}\x00${pid}`) || 0;
        const ratio = (totalInvested > 0 && investedHere > 0) ? investedHere / totalInvested : 0;
        const allocatedTotal = ratio > 0 ? adCostTotal * ratio : null;

        const outputVideos = videosOfProductAll.filter(r => num(r['用户支付金额(元)']) > 0);
        const outputVideoCount = outputVideos.length;
        let topVideo = null;
        for (const v of outputVideos) {
          if (!topVideo || num(v['用户支付金额(元)']) > num(topVideo['用户支付金额(元)'])) topVideo = v;
        }

        items.push({
          pid,
          productName: productName.get(pid) || '(未知商品)',
          gsv,
          publishCount: pubCount,
          adCostThisMonth: allocatedThisMonth,
          adCostTotal: allocatedTotal,
          outputVideoCount,
          topVideoLink: topVideo ? (topVideo['播放链接'] || '') : '',
          topVideoPubTime: topVideo ? formatPubTime(topVideo['发布时间']) : '',
          topVideoSales: topVideo ? num(topVideo['用户支付金额(元)']) : 0,
        });
      }
      items.sort((a, b) => b.gsv - a.gsv);

      // ===== 输出主行 + 子行 =====
      // 主行：达人名 + 4 个汇总值（GSV 列为空）
      rows.push({
        _type: 'header',
        name,
        contact: contactMap.get(name) || '',  // 自动从发布明细表带出，localStorage 手编值后面覆盖
        pid: '',
        productName: '',
        publishCount,
        gsv: null,            // 主行无 GSV（按商品拆）
        gsvTotal,
        adCostThisMonth,
        adCostTotal,
        outputVideoCount: null,
        topVideoLink: '',
        topVideoPubTime: '',
        topVideoSales: 0,
      });
      // 子行：商品ID + 商品名 + 按商品的 GSV + 发布条数 + 投放消耗 + 有产出素材数 + 最高产出视频
      for (const it of items) {
        rows.push({
          _type: 'item',
          name: '',
          contact: null,
          pid: it.pid,
          productName: it.productName,
          publishCount: it.publishCount,
          gsv: it.gsv,
          gsvTotal: null,
          adCostThisMonth: it.adCostThisMonth,
          adCostTotal: it.adCostTotal,
          outputVideoCount: it.outputVideoCount,
          topVideoLink: it.topVideoLink,
          topVideoPubTime: it.topVideoPubTime,
          topVideoSales: it.topVideoSales,
        });
      }
    }

    // 按主行（达人）合计GSV 排序：先把 header 抽出来排，再插回子行
    const headers = rows.filter(r => r._type === 'header');
    headers.sort((a, b) => b.gsvTotal - a.gsvTotal);
    const sorted = [];
    for (const h of headers) {
      sorted.push(h);
      // 找出紧跟该 header 的子行（在原 rows 里的顺序）
      const origIdx = rows.indexOf(h);
      for (let i = origIdx + 1; i < rows.length && rows[i]._type === 'item'; i++) {
        sorted.push(rows[i]);
      }
    }

    // 合计行（合计行只在汇总列汇总；3 个新列在合计行留空）
    const total = {
      _type: 'total',
      name: '合计',
      contact: null,
      pid: '',
      productName: '',
      publishCount: headers.reduce((s, r) => s + r.publishCount, 0),
      gsv: null,
      gsvTotal: headers.reduce((s, r) => s + r.gsvTotal, 0),
      adCostThisMonth: headers.reduce((s, r) => s + r.adCostThisMonth, 0),
      adCostTotal: headers.reduce((s, r) => s + r.adCostTotal, 0),
      outputVideoCount: null,
      topVideoLink: '',
      topVideoPubTime: '',
      topVideoSales: 0,
    };
    sorted.push(total);

    // 从 localStorage 回填手编对接人（按 达人昵称 匹配）
    const talentMeta = loadTalentMeta();
    for (const r of sorted) {
      if (r._type === 'header' && talentMeta[r.name]?.contact != null) {
        r.contact = talentMeta[r.name].contact;
      }
    }

    return sorted;
  }

  // ============ 计算：商品维度 ============
  function computeProduct() {
    const { cooperation_video, talent_publish, ad_product } = state.data;

    // 从乘方推广-产品表收集商品（去重），同时建立 商品ID→商品名称 字典
    const productMap = new Map(); // pid → { name, ... }
    const nameToId = new Map();   // 商品名称 → pid（用于反查达人发布表里没填商品ID的行）
    for (const r of ad_product) {
      const pid = String(r['商品ID'] || '').trim();
      if (!pid) continue;
      if (!productMap.has(pid)) {
        productMap.set(pid, { pid, name: r['商品名称'] || '' });
      }
      // 商品名称反查字典：完整名 + 关键词
      const nm = (r['商品名称'] || '').trim();
      if (nm && !nameToId.has(nm)) nameToId.set(nm, pid);
    }

    // 反查达人发布明细的商品 ID
    // 达人发布明细里"产品名称"是短名（如"奶酪鸡块"），乘方推广里是长名（如"【圣农】原汁原味肉多多鸡块小马奶酪鸡块..."）
    // 优先级：商品ID列 > 手动映射 > 短名精确 > 短名模糊（"短名包含于长名"）
    const nameMapping = loadNameMapping();
    function lookupPid(pubRow) {
      const directPid = String(pubRow['商品ID'] || '').trim();
      if (directPid && productMap.has(directPid)) return directPid;
      const shortName = (pubRow['产品名称'] || '').trim();
      if (!shortName) return null;
      if (nameMapping[shortName] && productMap.has(nameMapping[shortName])) return nameMapping[shortName];
      if (nameToId.has(shortName)) return nameToId.get(shortName);
      for (const [longName, pid] of nameToId) {
        if (longName.includes(shortName)) return pid;
      }
      return null;
    }

    const rows = [];
    let unmapped = 0;  // 反查失败的发布记录数

    for (const [pid, p] of productMap) {
      // ⑤ 当月素材发布条数 = 达人发布明细 月份=当月 商品ID=该商品 count
      let publishCount = 0;
      for (const pub of talent_publish) {
        if (pub['月份'] !== state.monthLabel) continue;
        if (lookupPid(pub) === pid) publishCount++;
      }

      // ⑥ 投放消耗 = 乘方推广-产品 4 账号合并 日期='全部' sum(整体消耗 ?? 综合成本)
      const adCost = ad_product
        .filter(r => String(r['商品ID']) === pid && r['日期'] === '全部')
        .reduce((s, r) => s + adCostOf(r), 0);

      // ⑦ 净成交金额 = 乘方推广-产品 4 账号合并 日期='全部' sum(净成交金额)
      const netSales = ad_product
        .filter(r => String(r['商品ID']) === pid && r['日期'] === '全部')
        .reduce((s, r) => s + num(r['净成交金额']), 0);

      // ⑧ ROI = 净成交金额 / 投放消耗
      const roi = adCost > 0 ? (netSales / adCost) : null;

      // ⑨ 主要产出视频链接 = 合作视频 该商品ID 按 用户支付金额(元) 降序 top 3
      const topVideos = cooperation_video
        .filter(r => String(r['带货商品ID']) === pid)
        .sort((a, b) => num(b['用户支付金额(元)']) - num(a['用户支付金额(元)']))
        .slice(0, 3)
        .map(r => ({
          link: r['播放链接'],
          sales: num(r['用户支付金额(元)']),
          talent: r['达人昵称'],
        }));

      rows.push({
        pid,
        name: p.name,
        category: '',        // 手编（task 6 接 localStorage）
        unitPrice: null,     // 手编
        publishCount,
        adCost,
        netSales,
        roi,
        topVideos,
      });
    }

    // 统计反查失败数
    for (const pub of talent_publish) {
      if (pub['月份'] !== state.monthLabel) continue;
      if (!lookupPid(pub)) unmapped++;
    }

    // 按净成交金额降序
    rows.sort((a, b) => b.netSales - a.netSales);

    // 从 localStorage 回填手编值（按 商品ID 匹配）
    const meta = loadProductMeta();
    for (const r of rows) {
      if (meta[r.pid]) {
        if (meta[r.pid].category != null) r.category = meta[r.pid].category;
        if (meta[r.pid].unitPrice != null) r.unitPrice = meta[r.pid].unitPrice;
      }
    }

    // 合计行
    const total = {
      pid: '', name: '合计', category: '', unitPrice: null,
      publishCount: rows.reduce((s, r) => s + r.publishCount, 0),
      adCost: rows.reduce((s, r) => s + r.adCost, 0),
      netSales: rows.reduce((s, r) => s + r.netSales, 0),
      roi: null,
      topVideos: [],
      _isTotal: true,
    };
    const totalCost = total.adCost;
    total.roi = totalCost > 0 ? total.netSales / totalCost : null;
    rows.push(total);

    return { rows, unmapped };
  }

  // ============ 计算：商品 ID 反查诊断 ============
  // 扫描达人发布明细当月条目，列出"未填商品ID 列"且短名反查不靠谱（失败/歧义/已手动映射）的情况
  function computeDiagnostics() {
    const { talent_publish, ad_product } = state.data;
    const monthLabel = state.monthLabel;
    const nameMapping = loadNameMapping();

    const productList = [];
    const seenPids = new Set();
    const nameToId = new Map();
    for (const r of ad_product) {
      const pid = String(r['商品ID'] || '').trim();
      const nm = (r['商品名称'] || '').trim();
      if (!pid || !nm) continue;
      if (!nameToId.has(nm)) nameToId.set(nm, pid);
      if (!seenPids.has(pid)) {
        seenPids.add(pid);
        productList.push({ pid, name: nm });
      }
    }

    // 按短名聚合当月发布表里"未填商品ID"的记录
    const shortStats = new Map();
    for (const pub of talent_publish) {
      if (pub['月份'] !== monthLabel) continue;
      const directPid = String(pub['商品ID'] || '').trim();
      if (directPid) continue;
      const short = (pub['产品名称'] || '').trim();
      if (!short) continue;
      if (!shortStats.has(short)) {
        const candidates = [];
        if (nameToId.has(short)) {
          candidates.push({ pid: nameToId.get(short), name: short, exact: true });
        } else {
          const seen = new Set();
          for (const [longName, pid] of nameToId) {
            if (longName.includes(short) && !seen.has(pid)) {
              seen.add(pid);
              candidates.push({ pid, name: longName });
            }
          }
        }
        shortStats.set(short, { count: 0, contacts: new Set(), candidates });
      }
      const stat = shortStats.get(short);
      stat.count++;
      const contact = (pub['对接人'] || '').trim();
      if (contact) stat.contacts.add(contact);
    }

    const unmapped = [], ambiguous = [], mapped = [], single = [];
    for (const [short, stat] of shortStats) {
      const mappedPid = (nameMapping[short] && seenPids.has(nameMapping[short])) ? nameMapping[short] : null;
      const entry = {
        short, count: stat.count,
        contacts: Array.from(stat.contacts),
        candidates: stat.candidates,
        mappedPid,
      };
      if (mappedPid) mapped.push(entry);
      else if (stat.candidates.length === 0) unmapped.push(entry);
      else if (stat.candidates.length > 1) ambiguous.push(entry);
      else single.push(entry); // 单一命中：默认认为正常，但允许审计
    }

    // 失败排前面、按条数降序
    unmapped.sort((a, b) => b.count - a.count);
    ambiguous.sort((a, b) => b.count - a.count);
    mapped.sort((a, b) => b.count - a.count);
    single.sort((a, b) => b.count - a.count);

    return { productList, unmapped, ambiguous, mapped, single };
  }

  // ============ 渲染：反查诊断面板 ============
  function renderDiagnostics() {
    const panel = document.getElementById('diag-panel');
    const summary = document.getElementById('diag-summary');
    const body = document.getElementById('diag-body');
    const { unmapped, ambiguous, mapped, single, productList } = state.diagnostics;

    const total = unmapped.length + ambiguous.length + mapped.length + single.length;
    if (total === 0) {
      panel.style.display = 'none';
      return;
    }
    panel.style.display = '';
    const parts = [];
    if (unmapped.length) parts.push(`反查失败 <b style="color:var(--err)">${unmapped.length}</b>`);
    if (ambiguous.length) parts.push(`歧义 <b style="color:var(--warn)">${ambiguous.length}</b>`);
    if (mapped.length) parts.push(`已手动映射 <b style="color:var(--ok)">${mapped.length}</b>`);
    if (single.length) parts.push(`单一命中 <b style="color:var(--muted)">${single.length}</b>`);
    summary.innerHTML = '(' + parts.join(' · ') + ')';

    const renderRow = (entry, statusClass, statusLabel) => {
      const opts = ['<option value="">--未指定--</option>'].concat(
        productList.map(p =>
          `<option value="${escapeHtml(p.pid)}" ${entry.mappedPid === p.pid ? 'selected' : ''}>${escapeHtml(p.name.substring(0, 40))}${p.name.length > 40 ? '…' : ''}</option>`
        )
      ).join('');
      const cands = entry.candidates.length > 0
        ? entry.candidates.map(c => `<span title="${escapeHtml(c.name)}">${escapeHtml(c.name.substring(0, 22))}${c.name.length > 22 ? '…' : ''}</span>`).join(' / ')
        : '<span style="color:var(--err)">无候选</span>';
      return `
        <tr>
          <td><span class="status-${statusClass}">${statusLabel}</span></td>
          <td><b>${escapeHtml(entry.short)}</b></td>
          <td class="num">${entry.count}</td>
          <td style="color:var(--muted);font-size:12px">${escapeHtml(entry.contacts.join(' / '))}</td>
          <td style="font-size:12px;color:var(--muted)">${cands}</td>
          <td><select class="mapping-select" data-short="${escapeHtml(entry.short)}" style="max-width:280px">${opts}</select></td>
        </tr>
      `;
    };

    // "单一命中"默认显示当前命中的长名作为候选；用户审计时如果发现归错，可在右侧改
    // 给 single 列表里每条的 mappedPid 暂填当前命中（仅用于 select 高亮显示，不实际写入 localStorage）
    const singleWithHint = single.map(e => ({ ...e, mappedPid: e.candidates[0]?.pid || null }));

    body.innerHTML = `
      <div style="font-size:13px;color:var(--muted);margin-bottom:8px">
        达人发布明细表"产品名称"列是短名，需要反查到乘方推广表的商品 ID。下方列出反查情况，请在右侧指定目标商品（保存到 localStorage，下次自动命中）。
        <br><b>建议</b>：让运营在达人发布表的"商品ID"列直接填 ID，可绕过本面板。
      </div>
      <div class="table-wrap" style="max-height:500px">
        <table>
          <thead>
            <tr>
              <th>状态</th>
              <th>短名</th>
              <th class="num">条数</th>
              <th>对接人</th>
              <th>当前候选（长名）</th>
              <th>指定目标商品</th>
            </tr>
          </thead>
          <tbody>
            ${unmapped.map(e => renderRow(e, 'err', '失败')).join('')}
            ${ambiguous.map(e => renderRow(e, 'warn', '歧义')).join('')}
            ${mapped.map(e => renderRow(e, 'ok', '已映射')).join('')}
            ${singleWithHint.length ? `<tr><td colspan="6" style="background:#fafafa;color:var(--muted);font-size:12px;padding:6px 12px">▾ 以下为"单一候选"短名 — 当前算法自动归属（如发现归错请在右侧改）</td></tr>` : ''}
            ${singleWithHint.map(e => renderRow(e, 'muted', '单一')).join('')}
          </tbody>
        </table>
      </div>
    `;

    body.querySelectorAll('.mapping-select').forEach(sel => {
      sel.addEventListener('change', () => {
        const short = sel.dataset.short;
        const pid = sel.value;
        updateNameMapping(short, pid);
        console.log(`✎ 短名映射: "${short}" → ${pid || '(已清除)'}`);
        recompute();
      });
    });
  }

  // ============ 重新计算入口 ============
  function recompute() {
    state.talent = [];
    state.product = [];
    let productResult = { rows: [], unmapped: 0 };

    // 月份已在 rebuildDataIndex 里推断好
    console.log(`📅 当前分析月份: ${state.monthLabel} (${state.currentYear}-${String(state.currentMonth).padStart(2,'0')})`);

    // 至少要有这些表才能算
    if (state.data.union_orders.length > 0 || state.data.ad_product.length > 0) {
      state.talent = computeTalent();
      productResult = computeProduct();
      state.product = productResult.rows;
    }

    // 诊断面板（即使没算出商品维度也可以独立诊断）
    state.diagnostics = computeDiagnostics();
    renderDiagnostics();

    if (state.talent.length === 0 && state.product.length === 0) {
      renderTalentTable();
      renderProductTable();
      btnExport.disabled = true;
      return;
    }

    console.log('=== 达人维度 (前 5 + 合计) ===');
    console.table(state.talent.slice(0, 5).concat(state.talent[state.talent.length - 1]).map(r => ({
      达人: r.name,
      发布数: r.publishCount,
      GSV: fmtMoney(r.gsv),
      合计GSV: fmtMoney(r.gsvTotal),
      投放消耗_当月: fmtMoney(r.adCostThisMonth),
      投放消耗_含非当月: fmtMoney(r.adCostTotal),
    })));

    console.log('=== 商品维度 (前 5 + 合计) ===');
    console.table(state.product.slice(0, 5).concat(state.product[state.product.length - 1]).map(r => ({
      商品ID: r.pid,
      商品名: (r.name || '').substring(0, 20),
      发布数: r.publishCount,
      投放消耗: fmtMoney(r.adCost),
      净成交金额: fmtMoney(r.netSales),
      ROI: r.roi == null ? '-' : r.roi.toFixed(2),
      产出视频数: r.topVideos.length,
    })));
    if (productResult.unmapped > 0) {
      console.warn(`⚠️ 达人发布明细表中 ${productResult.unmapped} 条 ${state.monthLabel}记录无法反查到商品ID（产品名不在乘方推广表中出现 — 见上方"反查诊断"面板）`);
    }

    renderTalentTable();
    renderProductTable();
    btnExport.disabled = state.talent.length === 0 && state.product.length === 0;
  }

  // ============ 渲染：达人维度表（主行 + 商品子行）============
  function renderTalentTable() {

      return;
    }
    el.className = '';
    const html = `
      <table>
        <thead>
          <tr>
            <th>达人昵称</th>
            <th>对接人<span style="font-weight:normal;color:#d48806;font-size:11px">（可编辑）</span></th>
            <th class="num">当月发布条数</th>
            <th>商品ID</th>
            <th>商品名称</th>
            <th class="num">GSV<span style="font-weight:normal;color:#999;font-size:11px">（按商品）</span></th>
            <th class="num">达人合计GSV</th>
            <th class="num">当月发布素材投放消耗</th>
            <th class="num">投放消耗（含非当月）</th>
            <th class="num">有产出素材数</th>
            <th>主要产出视频</th>
            <th>视频发布时间</th>
          </tr>
        </thead>
        <tbody>
          ${state.talent.map((r, i) => {
            const cls = r._type === 'total' ? 'total' : (r._type === 'header' ? 'talent-header' : 'talent-item');
            const contactCell = r._type === 'header'
              ? `<td class="editable" data-table="talent" data-i="${i}" data-field="contact">${escapeHtml(r.contact || '')}</td>`
              : `<td></td>`;
            const topVideoCell = r._type === 'item' && r.topVideoLink
              ? `<a href="${escapeHtml(r.topVideoLink)}" target="_blank" style="color:var(--primary);text-decoration:none;font-size:12px" title="¥${r.topVideoSales.toFixed(0)}">查看视频<span style="color:var(--muted);margin-left:4px">¥${r.topVideoSales >= 10000 ? (r.topVideoSales/10000).toFixed(1)+'万' : r.topVideoSales.toFixed(0)}</span></a>`
              : '<span class="empty">-</span>';
            return `
              <tr class="${cls}">
                <td>${r._type === 'item' ? '' : escapeHtml(r.name)}</td>
                ${contactCell}
                <td class="num">${r.publishCount != null ? (r.publishCount ? fmtInt(r.publishCount) : '0') : ''}</td>
                <td style="font-family: ui-monospace, monospace; font-size: 12px;">${escapeHtml(r.pid || '')}</td>
                <td title="${escapeHtml(r.productName || '')}">${escapeHtml((r.productName || '').substring(0, 28))}${r.productName && r.productName.length > 28 ? '…' : ''}</td>
                <td class="num">${r.gsv != null ? fmtMoney(r.gsv) : ''}</td>
                <td class="num">${r.gsvTotal != null ? fmtMoney(r.gsvTotal) : ''}</td>
                <td class="num">${r.adCostThisMonth != null && r.adCostThisMonth > 0 ? fmtMoney(r.adCostThisMonth) : '<span class="empty">-</span>'}</td>
                <td class="num">${r.adCostTotal != null && r.adCostTotal > 0 ? fmtMoney(r.adCostTotal) : '<span class="empty">-</span>'}</td>
                <td class="num">${r._type === 'item' ? (r.outputVideoCount ? fmtInt(r.outputVideoCount) : '<span class="empty">-</span>') : ''}</td>
                <td>${r._type === 'item' ? topVideoCell : ''}</td>
                <td style="font-size:12px;color:var(--muted)">${r._type === 'item' ? escapeHtml(r.topVideoPubTime || '') : ''}</td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
    el.innerHTML = html;

    // 绑定 inline 编辑
    document.querySelectorAll('#table-talent .editable').forEach(td => {
      td.addEventListener('click', () => startEdit(td));
    });
  }

  // ============ 渲染：商品维度表 ============
  function renderProductTable() {
    const el = document.getElementById('table-product');
    if (!state.product.length) {
      el.className = 'placeholder';
      el.innerHTML = '上传文件后自动生成';
      return;
    }
    el.className = '';
    const html = `
      <table>
        <thead>
          <tr>
            <th>分类<span style="font-weight:normal;color:#d48806;font-size:11px">（可编辑）</span></th>
            <th>商品名称</th>
            <th>商品ID</th>
            <th class="num">客单价<span style="font-weight:normal;color:#d48806;font-size:11px">（可编辑）</span></th>
            <th class="num">${state.monthLabel}素材发布条数</th>
            <th class="num">投放消耗</th>
            <th class="num">净成交金额</th>
            <th class="num">ROI</th>
            <th>主要产出视频链接</th>
          </tr>
        </thead>
        <tbody>
          ${state.product.map((r, i) => {
            if (r._isTotal) {
              return `
                <tr class="total">
                  <td>${escapeHtml(r.name)}</td>
                  <td colspan="3"></td>
                  <td class="num">${fmtInt(r.publishCount)}</td>
                  <td class="num">${fmtMoney(r.adCost)}</td>
                  <td class="num">${fmtMoney(r.netSales)}</td>
                  <td class="num">${r.roi == null ? '-' : r.roi.toFixed(2)}</td>
                  <td></td>
                </tr>
              `;
            }
            return `
              <tr>
                <td class="editable" data-i="${i}" data-field="category">${escapeHtml(r.category || '')}</td>
                <td title="${escapeHtml(r.name)}">${escapeHtml((r.name || '').substring(0, 30))}${r.name && r.name.length > 30 ? '…' : ''}</td>
                <td style="font-family: ui-monospace, monospace; font-size: 12px;">${escapeHtml(r.pid)}</td>
                <td class="num editable" data-i="${i}" data-field="unitPrice">${r.unitPrice == null ? '' : r.unitPrice}</td>
                <td class="num">${r.publishCount ? fmtInt(r.publishCount) : '<span class="empty">-</span>'}</td>
                <td class="num">${r.adCost ? fmtMoney(r.adCost) : '<span class="empty">-</span>'}</td>
                <td class="num">${r.netSales ? fmtMoney(r.netSales) : '<span class="empty">-</span>'}</td>
                <td class="num">${r.roi == null ? '<span class="empty">-</span>' : r.roi.toFixed(2)}</td>
                <td class="video-links">
                  ${r.topVideos.length === 0 ? '<span class="empty">-</span>' : r.topVideos.map(v => `
                    <a href="${escapeHtml(v.link || '#')}" target="_blank" title="${escapeHtml(v.talent || '')} ¥${v.sales.toFixed(0)}">
                      ${escapeHtml((v.talent || '').substring(0, 12))}<span class="sales">¥${v.sales >= 10000 ? (v.sales/10000).toFixed(1)+'万' : v.sales.toFixed(0)}</span>
                    </a>
                  `).join('')}
                </td>
              </tr>
            `;
          }).join('')}
        </tbody>
      </table>
    `;
    el.innerHTML = html;

    // 绑定 inline 编辑
    document.querySelectorAll('#table-product .editable').forEach(td => {
      td.addEventListener('click', () => startEdit(td));
    });
  }

  // ============ inline 编辑（通用：product / talent）============
  function startEdit(td) {
    if (td.querySelector('input')) return; // 已在编辑
    const table = td.dataset.table || 'product';
    const stateArr = table === 'talent' ? state.talent : state.product;
    const rerender = table === 'talent' ? renderTalentTable : renderProductTable;
    const i = +td.dataset.i;
    const field = td.dataset.field;
    const cur = stateArr[i][field];
    const isNum = field === 'unitPrice';

    const input = document.createElement('input');
    input.type = isNum ? 'number' : 'text';
    if (isNum) {
      input.step = '0.01';
      input.classList.add('num-input');
    }
    input.value = cur == null ? '' : cur;
    td.innerHTML = '';
    td.appendChild(input);
    input.focus();
    input.select();

    let done = false;
    const commit = () => {
      if (done) return;
      done = true;
      let v = input.value.trim();
      if (isNum) {
        v = v === '' ? null : parseFloat(v);
        if (isNum && isNaN(v)) v = null;
      }
      stateArr[i][field] = v;
      // 持久化到 localStorage
      if (table === 'talent') {
        updateTalentMeta(stateArr[i].name, field, v);
        console.log(`✎ 编辑(达人): ${stateArr[i].name} [${field}] = ${v} (已存)`);
      } else {
        updateProductMeta(stateArr[i].pid, field, v);
        console.log(`✎ 编辑(商品): ${stateArr[i].name} [${field}] = ${v} (已存)`);
      }
      rerender();
    };
    input.addEventListener('blur', commit);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { done = true; rerender(); }
    });
  }

  // ============ 导出 Excel ============
  function exportToExcel() {
    const wb = XLSX.utils.book_new();

    // —— Sheet 1: 达人维度 ——
    const talentRows = state.talent.map(r => ({
      '达人昵称':              r.name || '',
      '对接人':                r.contact || '',
      '当月发布条数':          r.publishCount != null ? r.publishCount : '',
      '商品ID':                r.pid || '',
      '商品名称':              r.productName || '',
      'GSV（按商品）':         r.gsv != null ? Number(r.gsv.toFixed(2)) : '',
      '达人合计GSV':           r.gsvTotal != null ? Number(r.gsvTotal.toFixed(2)) : '',
      '当月发布素材投放消耗':  r.adCostThisMonth != null ? Number(r.adCostThisMonth.toFixed(2)) : '',
      '投放消耗（含非当月）':  r.adCostTotal != null ? Number(r.adCostTotal.toFixed(2)) : '',
      '有产出素材数':          r._type === 'item' ? (r.outputVideoCount || 0) : '',
      '主要产出视频':          r._type === 'item' ? (r.topVideoLink || '') : '',
      '视频发布时间':          r._type === 'item' ? (r.topVideoPubTime || '') : '',
    }));
    const ws1 = XLSX.utils.json_to_sheet(talentRows);
    // 列宽
    ws1['!cols'] = [
      { wch: 18 }, { wch: 10 }, { wch: 12 }, { wch: 22 }, { wch: 32 },
      { wch: 14 }, { wch: 14 }, { wch: 20 }, { wch: 20 },
      { wch: 12 }, { wch: 50 }, { wch: 14 },
    ];
    XLSX.utils.book_append_sheet(wb, ws1, '达人维度');

    // —— Sheet 2: 商品维度 ——
    const productRows = state.product.map(r => ({
      '分类':              r.category || '',
      '商品名称':          r.name || '',
      '商品ID':            r.pid || '',
      '客单价':            r.unitPrice != null ? Number(r.unitPrice) : '',
      [`${state.monthLabel}素材发布条数`]: r.publishCount || 0,
      '投放消耗':          r.adCost != null ? Number(r.adCost.toFixed(2)) : '',
      '净成交金额':        r.netSales != null ? Number(r.netSales.toFixed(2)) : '',
      'ROI':               r.roi == null ? '-' : Number(r.roi.toFixed(2)),
      '主要产出视频链接':  (r.topVideos || []).map(v =>
        `${v.talent || ''} ¥${v.sales.toFixed(0)} ${v.link || ''}`
      ).join('\n'),
    }));
    const ws2 = XLSX.utils.json_to_sheet(productRows);
    ws2['!cols'] = [
      { wch: 10 }, { wch: 32 }, { wch: 22 }, { wch: 10 },
      { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 8 },
      { wch: 60 },
    ];
    XLSX.utils.book_append_sheet(wb, ws2, '商品维度');

    // 文件名 kila-数据汇总-YYYYMMDD.xlsx
    const d = new Date();
    const yyyymmdd = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
    const filename = `kila-数据汇总-${yyyymmdd}.xlsx`;
    XLSX.writeFile(wb, filename);
    console.log(`✓ 已导出 ${filename}（达人维度 ${talentRows.length} 行 / 商品维度 ${productRows.length} 行）`);
  }

  // ============ 健康检查 ============
  window.addEventListener('load', () => {
    if (typeof XLSX === 'undefined') {
      alert('SheetJS 加载失败，请检查网络或换 CDN');
    } else {
      console.log('✓ SheetJS 已加载，版本:', XLSX.version);
    }
  });
</script>
